# Inline link-checker rather than using the d-morrison/gha wrapper because the
# wrapper doesn't expose failIfEmpty — needed here since the package has no
# links yet. Tracked upstream at d-morrison/gha#91; revert to the wrapper once
# d-morrison/gha#92 merges and the v1 tag is updated.
name: Check Links

on:
  push:
    branches:
      - main
      - master
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
  schedule:
    # Run weekly on Mondays at 9:00 UTC to catch link rot
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  link-checker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: read
    steps:
      - uses: actions/checkout@v4

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --verbose --no-progress './**/*.md' './**/*.qmd' './**/*.html'
          failIfEmpty: false
          fail: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
